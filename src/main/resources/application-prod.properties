#==================================================================
# 生产环境配置：所有敏感信息必须通过环境变量注入，禁止在此写明文
#   DB_HOST / DB_PORT / DB_NAME / DB_USERNAME / DB_PASSWORD
#   DRUID_USERNAME / DRUID_PASSWORD / DRUID_ALLOW_IP
#==================================================================

#数据库配置
spring.datasource.druid.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.druid.url=jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&allowMultiQueries=true&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
spring.datasource.druid.username=${DB_USERNAME}
spring.datasource.druid.password=${DB_PASSWORD}

#Druid 连接池参数
spring.datasource.druid.initial-size=10
spring.datasource.druid.min-idle=10
spring.datasource.druid.max-active=50
spring.datasource.druid.max-wait=60000
spring.datasource.druid.time-between-eviction-runs-millis=60000
spring.datasource.druid.min-evictable-idle-time-millis=300000
spring.datasource.druid.validation-query=SELECT 1 FROM DUAL
spring.datasource.druid.test-while-idle=true
spring.datasource.druid.test-on-borrow=false
spring.datasource.druid.test-on-return=false
spring.datasource.druid.pool-prepared-statements=true
spring.datasource.druid.max-pool-prepared-statement-per-connection-size=20

#Druid 监控页：生产默认仅允许内网白名单访问，口令必须由环境变量提供
spring.datasource.druid.stat-view-servlet.enabled=true
spring.datasource.druid.stat-view-servlet.url-pattern=/druid/*
spring.datasource.druid.stat-view-servlet.login-username=${DRUID_USERNAME}
spring.datasource.druid.stat-view-servlet.login-password=${DRUID_PASSWORD}
spring.datasource.druid.stat-view-servlet.reset-enable=false
spring.datasource.druid.stat-view-servlet.allow=${DRUID_ALLOW_IP:127.0.0.1}

#Web 请求采集
spring.datasource.druid.web-stat-filter.enabled=true
spring.datasource.druid.web-stat-filter.url-pattern=/*
spring.datasource.druid.web-stat-filter.exclusions=*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*,/swagger-ui.html,/doc.html,/swagger-resources/**,/webjars/**

#SQL 性能与慢 SQL
spring.datasource.druid.filter.stat.enabled=true
spring.datasource.druid.filter.stat.log-slow-sql=true
spring.datasource.druid.filter.stat.slow-sql-millis=2000
spring.datasource.druid.filter.stat.merge-sql=true

#WallFilter 防 SQL 注入
spring.datasource.druid.filter.wall.enabled=true
spring.datasource.druid.filter.wall.config.multi-statement-allow=true
spring.datasource.druid.filter.wall.config.none-base-statement-allow=true

#启用过滤器
spring.datasource.druid.filters=stat,wall,slf4j

mybatis.mapper-locations=classpath:mapper/*.xml

spring.web.resources.add-mappings=false
server.port=${SERVER_PORT:8090}
